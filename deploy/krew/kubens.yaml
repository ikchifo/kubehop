apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: ns
spec:
  version: v0.1.0
  homepage: https://github.com/ikchifo/kubehop
  shortDescription: "Fast Kubernetes namespace switcher"
  description: |
    A fast Kubernetes namespace switcher written in Rust.
    Supports interactive fuzzy selection, direct switching,
    and per-context namespace state.
  caveats: |
    Usage:
      kubectl ns             : list namespaces (interactive when TTY)
      kubectl ns NAME        : switch to namespace NAME
      kubectl ns -           : switch to previous namespace
      kubectl ns -c          : show current namespace
      kubectl ns -u          : reset namespace to "default"
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ikchifo/kubehop/releases/download/v0.1.0/kubens_linux_amd64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubens
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ikchifo/kubehop/releases/download/v0.1.0/kubens_linux_arm64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubens
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ikchifo/kubehop/releases/download/v0.1.0/kubens_darwin_amd64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubens
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ikchifo/kubehop/releases/download/v0.1.0/kubens_darwin_arm64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubens
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/ikchifo/kubehop/releases/download/v0.1.0/kubens_windows_amd64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubens.exe
