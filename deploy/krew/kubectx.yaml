apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: ctx
spec:
  version: v0.1.0
  homepage: https://github.com/ikennao/kubehop
  shortDescription: "Fast Kubernetes context switcher"
  description: |
    A fast Kubernetes context switcher written in Rust.
    Supports interactive fuzzy selection, direct switching,
    renaming, deleting, and unsetting contexts.
  caveats: |
    Usage:
      kubectl ctx             : list contexts (interactive when TTY)
      kubectl ctx NAME        : switch to context NAME
      kubectl ctx -           : switch to previous context
      kubectl ctx -c          : show current context
      kubectl ctx -d NAME     : delete context (or '.' for current)
      kubectl ctx NEW=OLD     : rename context
      kubectl ctx -u          : unset current context
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ikennao/kubehop/releases/download/v0.1.0/kubectx_linux_amd64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubectx
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ikennao/kubehop/releases/download/v0.1.0/kubectx_linux_arm64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubectx
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ikennao/kubehop/releases/download/v0.1.0/kubectx_darwin_amd64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubectx
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ikennao/kubehop/releases/download/v0.1.0/kubectx_darwin_arm64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubectx
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/ikennao/kubehop/releases/download/v0.1.0/kubectx_windows_amd64.tar.gz
      sha256: PLACEHOLDER_SHA256
      bin: kubectx.exe
